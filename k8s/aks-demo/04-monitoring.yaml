# --- Prometheus ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ddos-demo
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    scrape_configs:
      - job_name: "aggregator"
        static_configs:
          - targets: ["aggregator:9091"]
            labels:
              node: "aggregator"
      - job_name: "iot-agents"
        static_configs:
          - targets: ["iot-node-1:9090"]
            labels:
              node: "iot-node-1"
          - targets: ["iot-node-2:9090"]
            labels:
              node: "iot-node-2"
          - targets: ["iot-node-3:9090"]
            labels:
              node: "iot-node-3"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ddos-demo
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=1h
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ddos-demo
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  selector:
    app: prometheus
---
# --- Grafana Datasource ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: ddos-demo
  labels:
    app: grafana
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
# --- Grafana Dashboard Provider ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: ddos-demo
  labels:
    app: grafana
data:
  default.yaml: |
    apiVersion: 1
    providers:
      - name: Default
        orgId: 1
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
# --- Grafana Dashboard JSON ---
# NOTE: Create this ConfigMap from the dashboard file:
#   kubectl create configmap grafana-dashboards \
#     --from-file=ddos_dashboard.json=monitoring/grafana/dashboards/ddos_dashboard.json \
#     -n ddos-demo
# The deploy.ps1 script handles this automatically.
---
# --- Grafana Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ddos-demo
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ddos-demo
  labels:
    app: grafana
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana
