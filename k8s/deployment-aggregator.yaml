apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddos-aggregator
  labels:
    app: ddos-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddos-aggregator
  template:
    metadata:
      labels:
        app: ddos-aggregator
    spec:
      containers:
        - name: aggregator
          # Built and pushed as docker.io/gaud4/ddos-aggregator:latest
          image: docker.io/gaud4/ddos-aggregator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: grpc
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ddos-aggregator
  labels:
    app: ddos-aggregator
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: grpc
      protocol: TCP
  selector:
    app: ddos-aggregator
