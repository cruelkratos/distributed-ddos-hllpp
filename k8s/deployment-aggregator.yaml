apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddos-aggregator
  labels:
    app: ddos-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddos-aggregator
  template:
    metadata:
      labels:
        app: ddos-aggregator
    spec:
      containers:
        - name: aggregator
          image: gaud4/ddos-aggregator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /aggregator
          args:
            - -grpc=:50051
            - -metrics=:9091
            - -detector=zscore
            - -window=5s
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
            - containerPort: 9091
              name: metrics
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ddos-aggregator
  labels:
    app: ddos-aggregator
spec:
  type: ClusterIP
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
      protocol: TCP
    - port: 9091
      targetPort: 9091
      name: metrics
      protocol: TCP
  selector:
    app: ddos-aggregator
