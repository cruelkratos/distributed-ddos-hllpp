apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddos-aggregator
  labels:
    app: ddos-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddos-aggregator
  template:
    metadata:
      labels:
        app: ddos-aggregator
    spec:
      containers:
        - name: aggregator
          image: ddos-aggregator:latest
          imagePullPolicy: Never
          args:
            - -grpc=:8080
            - -metrics=:9090
            - -window=10s
            - -threshold=5000
            - -check=1s
          ports:
            - containerPort: 8080
              name: grpc
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ddos-aggregator
  labels:
    app: ddos-aggregator
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: grpc
      protocol: TCP
    - port: 9090
      targetPort: 9090
      name: metrics
      protocol: TCP
  selector:
    app: ddos-aggregator
