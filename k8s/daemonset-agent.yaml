apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ddos-agent
  labels:
    app: ddos-agent
spec:
  selector:
    matchLabels:
      app: ddos-agent
  template:
    metadata:
      labels:
        app: ddos-agent
    spec:
      # Run packet capture agent on every node
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: ddos-agent:latest
          imagePullPolicy: Never
          command:
            - /agent
          args:
            - -iface=eth0
            - -window=10s
            - -threshold=5000
            - -metrics=:9090
            - -aggregator-addr=ddos-aggregator:8080
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            capabilities:
              add:
                - NET_RAW
            # privileged required for raw pcap on Docker Desktop / most container runtimes
            privileged: true
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      tolerations:
        - operator: Exists
