apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ddos-agent
  labels:
    app: ddos-agent
spec:
  selector:
    matchLabels:
      app: ddos-agent
  template:
    metadata:
      labels:
        app: ddos-agent
    spec:
      # Run packet capture agent on every node
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          # Built and pushed as docker.io/gaud4/ddos-agent:latest
          image: docker.io/gaud4/ddos-agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - /agent
          args:
            # Leave iface empty to let pcap choose a default interface,
            # or set explicitly (e.g. -iface=eth0)
            - -iface=
            - -window=10s
            - -threshold=5000
            - -metrics=:9090
            - -check=1s
            - -ips-buf=10000
          # Optional: override via env or ConfigMap: IFACE, WINDOW_DURATION, THRESHOLD, AGGREGATOR_ADDR
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
            # required for pcap on many clusters; relax if your CNI allows
            privileged: true
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      tolerations:
        - operator: Exists
